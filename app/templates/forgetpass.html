	<!-- End Header -->
	<!--====Login Page=====-->
	<div class="login" style="margin-top: -14%;">

		<form method="post" action="/forget">
			<h1>Reset Password</h1>
            {% if message1  %}
            <span style="margin-left: 22%;color: red; font-size: medium;font-family: inherit;">{{message1}}</span>
			{% endif %}
			{% if success  %}
            <span style="margin-left: 10%;color: red; font-size: medium;font-family: inherit;">{{success}}</span>
			{% endif %}
            <input type="email" style="top:20px;position:relative;" id="email" name="email" placeholder="Email" required="required" pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$" />
			
			<input type="password" style="top:20px;position:relative;" id="password" class="password" name="password" placeholder="New Password" required="required" pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"title="Must contain at least one  number and one uppercase and lowercase letter, and at least 8 or more characters" />
			<span style="margin-left: 16rem;position: relative;color: white;top: -22px; font-size: small;" class="show">SHOW</span>
			<!-- {% if message2  %}
			<span style="margin-left: 26%;color: red; font-size: medium;;font-family: inherit;">{{message2}}</span>
			{% endif %} -->
			<span id="message" style="color: red;
            margin-left: 2.5rem;
            font-size: medium;
            font-family: inherit;
            letter-spacing: 0.5px;
			position:relative;
			top: -7px;">
            </span>
            <input type="password" id="cnfpassword" name="cnfpassword" placeholder="Confirm Password" onkeyup="check();"  required="required"  pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}" style="top:-2px;position:relative;"/>
			<div class="g-recaptcha" data-sitekey="6LcNU70kAAAAALwp_ePENk1lVBcM5ccZhuqKIc93" data-callback="enablesubmit"></div>
			<button type="submit" id="register" class="btn btn-primary btn-block btn-large" style="margin-top: 2.5%;"  onclick="submit()" disabled>Submit</button>
			<div class="register" style="color: white; margin-top: 1%; text-align: center;">
				<a href="/login">Login</a>
		   </div>
		</form>
	</div>
    <script>
        function check() {
          var pw1 = document.getElementById("password").value;
          var pw2 = document.getElementById("cnfpassword").value;
          if (pw1 == pw2) {
            document.getElementById("message").innerHTML ="";
          } 
          else {
            document.getElementById("message").innerHTML ="**Passwords are not same";
          }
        }
    </script>
	<script>
		function enablesubmit() {
			document.getElementById("register").disabled = false;
		}
		const pass_field = document.querySelector(".password");
		const showBtn = document.querySelector(".show");
			showBtn.addEventListener("click", function () {
				if (pass_field.type === "password") {
					pass_field.type = "text";
					showBtn.textContent = "HIDE";
					showBtn.style.color = "white"; 
			} else {
					pass_field.type = "password";
					showBtn.textContent = "SHOW";
					showBtn.style.color = "white";
				}
			});
	</script>
