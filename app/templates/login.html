<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8">
	<meta content="width=device-width, initial-scale=1.0" name="viewport">

	<title>Login</title>
	<meta content="" name="description">
	<meta content="" name="keywords">

	<!-- Google Fonts -->
	<link
		href="https://fonts.googleapis.com/css?family=Open+Sans:300,300i,400,400i,600,600i,700,700i|Jost:300,300i,400,400i,500,500i,600,600i,700,700i|Poppins:300,300i,400,400i,500,500i,600,600i,700,700i"
		rel="stylesheet">

	<!-- Vendor CSS Files -->
	<link href="../static/vendor/aos/aos.css" rel="stylesheet">
	<link href="../static/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
	<link href="../static/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
	<link href="../static/vendor/boxicons/css/boxicons.min.css" rel="stylesheet">
	<link href="../static/vendor/glightbox/css/glightbox.min.css" rel="stylesheet">
	<link href="../static/vendor/remixicon/remixicon.css" rel="stylesheet">
	<link href="../static/vendor/swiper/swiper-bundle.min.css" rel="stylesheet">

	<!-- Template Main CSS File -->
	<link href="../static/css/style.css" rel="stylesheet">
	<link href="../static/css/login.css" rel="stylesheet">
	<!--Google Recaptcha-->
	<script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>

<body>
	<!-- ======= Header ======= -->
	<header id="header" class="fixed-top ">
		<div class="container d-flex align-items-center">
			<!-- logo image -->
			<a href="/" class="logo me-auto"><img src="../static/img/logo2.jpg" alt="" class="img-fluid"></a>
			<!--Title-->
			<h1 class="logo me-auto" style="margin-left: -200px;"><a href="/">SCM EXPERT LITE</a></h1>
			<!-- start navbar  -->
			<nav id="navbar" class="navbar">
				<ul style="margin-left: 10%;">
					<li><a class="nav-link scrollto" href="/#home">Home</a></li>
					<li><a class="nav-link scrollto" href="/#clients">Partners</a></li>
					<li><a class="nav-link scrollto" href="/#about">About</a></li>
					<li><a class="nav-link scrollto" href="/#services">Services</a></li>
					<li><a class="nav-link scrollto" href="/#team">Team</a></li>
				</ul>
				<!-- <i class="bi bi-list mobile-nav-toggle"></i> -->
			</nav>
			<!-- End navbar -->

		</div>
	</header>
	<!-- End Header -->
	<!--====Login Page=====-->
	<div class="login" style="margin-top: -14%;">

		<form method="post" action="/dashboard" >
			<h1>Sign In</h1>
			{% if email %}  
			<span style="margin-left: 22%;color: red; font-size: medium;font-family: inherit; position: relative; letter-spacing: 0.6px;">{{email}}</span>
			{% endif %}
			<input type="email" style="top: 20px;position:relative;" id="email" name="email" placeholder="Email" required="required" pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$" />
			<input type="password" style="top:20px;position:relative;" id="password" class="password" name="password" placeholder="Password" required="required" title="Must contain at least one  number and one uppercase and lowercase letter, and at least 8 or more characters" />
			<span style="margin-left: 16rem;position: relative;color: white;top: -22px; font-size: small;" class="show" >SHOW</span>
			{% if credentials  %}
			<span style="margin-left: 26%;color: red; font-size: medium;font-family: inherit; position: relative;top: -8px; letter-spacing: 0.6px;">{{credentials}}</span>
			{% endif %}
			<div class="g-recaptcha" data-sitekey="6LcNU70kAAAAALwp_ePENk1lVBcM5ccZhuqKIc93" data-callback="enablesubmit"></div>
			<button type="submit" id="login" class="btn btn-primary btn-block btn-large" style="margin-top: 2.5%;"   disabled >Login</button>
			
			<div class="register" style="color: white; margin-top: 4%; text-align: center;">
				Don't have any account? <a href="/signup">Sign up!</a>
			</div>
			<div class="register" style="color: white; margin-top: 1%; text-align: center;">
				<a href="/forget">Forget Password?</a>
		   </div>
		</form>
	</div>
	
	<script>
		function enablesubmit() {
			document.getElementById("login").disabled = false;
		}
		const pass_field = document.querySelector(".password");
		const showBtn = document.querySelector(".show");
			showBtn.addEventListener("click", function () {
				if (pass_field.type === "password") {
					pass_field.type = "text";
					showBtn.textContent = "HIDE";
					showBtn.style.color = "white"; 
			} else {
					pass_field.type = "password";
					showBtn.textContent = "SHOW";
					showBtn.style.color = "white";
				}
			});
	</script>
	
	<!--End Login page-->


	<!-- ======= Footer ======= -->
	<footer id="footer" style="margin-top: 42%;">
		<div class="container footer-bottom clearfix">
			<div class="copyright">
				&copy; Copyright <strong><span>SCMXpert</span></strong>. All Rights Reserved
			</div>
			<div class="credits">
				Designed by <a href="https://www.exafluence.com/" target="_blank">Exafluence Inc.</a>
			</div>
		</div>
	</footer>
	<!-- End Footer -->



</body>

</html>
